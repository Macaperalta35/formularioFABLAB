<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Registro de Visitas FAB LAB INACAP</title>
    <style>
        :root {
            --primary: #ED1C24;
            --surface: #ffffff;
            --background: #f8f1ef;
            --text: #222222;
            --muted: #5a5a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, rgba(237,28,36,0.18), transparent 35%), var(--background);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 15px;
        }

        .header h1 {
            color: var(--text);
            font-size: 30px;
            letter-spacing: 0.02em;
        }

        .header .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
        }

        .logo img {
            max-width: 140px;
            width: auto;
            height: auto;
        }

        .logo-name {
            font-weight: 900;
            font-size: 24px;
            color: var(--text);
            letter-spacing: 0.12em;
        }

        .logo-subtitle {
            color: var(--primary);
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 16px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #c61a1e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237, 28, 36, 0.2);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(237, 28, 36, 0.08);
        }

        .table-container {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        th {
            background: var(--primary);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        td {
            color: var(--text);
        }

        .stat-card {
            background: white;
            border: 1px solid rgba(237, 28, 36, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #333;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #999;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="logo-inacap.svg" alt="INACAP logo" />
                <span class="logo-name">INACAP</span>
                <span class="logo-subtitle">Fab Lab</span>
            </div>
            <div>
                <h1>📊 Panel de Administración</h1>
                <p style="color: var(--muted); margin-top: 5px;">Gestión de Visitas FAB LAB INACAP</p>
            </div>
        </div>

        <div id="stats-container" class="stats"></div>

        <div style="margin-bottom: 20px;">
            <div class="actions">
                <button class="btn btn-primary" onclick="exportarExcel()">📥 Descargar Excel</button>
                <button class="btn btn-secondary" onclick="recargar()">🔄 Recargar</button>
            </div>
        </div>

        <div id="message-container"></div>

        <div class="table-container">
            <div id="loading-container" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Cargando datos...</p>
            </div>
            <div id="table-container" style="display:none;">
                <table id="visitas-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>RUT</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Tipo de Visita</th>
                            <th>Propósito</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
            <div id="no-data-container" class="no-data" style="display:none;">
                Aún no hay registros de visitas
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = `${window.location.protocol}//${window.location.hostname}:5001/api`;

        async function cargarDatos() {
            const loadingContainer = document.getElementById('loading-container');
            const tableContainer = document.getElementById('table-container');
            const noDataContainer = document.getElementById('no-data-container');
            const messageContainer = document.getElementById('message-container');

            loadingContainer.style.display = 'block';
            tableContainer.style.display = 'none';
            noDataContainer.style.display = 'none';
            messageContainer.innerHTML = '';

            try {
                const response = await fetch(`${BASE_URL}/visitas`);
                if (!response.ok) throw new Error('Error al obtener datos');

                const visitas = await response.json();
                const tbody = document.getElementById('table-body');
                const statsContainer = document.getElementById('stats-container');

                if (visitas.length === 0) {
                    noDataContainer.style.display = 'block';
                    loadingContainer.style.display = 'none';
                } else {
                    tbody.innerHTML = visitas.map(v => `
                        <tr>
                            <td>${v.id}</td>
                            <td>${v.nombre}</td>
                            <td>${v.rut}</td>
                            <td>${v.correo}</td>
                            <td>${v.telefono || '-'}</td>
                            <td>${v.tipo_visita}</td>
                            <td>${v.proposito || '-'}</td>
                            <td>${new Date(v.created_at).toLocaleDateString('es-CL')} ${new Date(v.created_at).toLocaleTimeString('es-CL')}</td>
                        </tr>
                    `).join('');

                    // Calcular estadísticas
                    const tipos = {};
                    visitas.forEach(v => {
                        tipos[v.tipo_visita] = (tipos[v.tipo_visita] || 0) + 1;
                    });

                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <h3>${visitas.length}</h3>
                            <p>Total de Visitas</p>
                        </div>
                        ${Object.entries(tipos).map(([tipo, count]) => `
                            <div class="stat-card">
                                <h3>${count}</h3>
                                <p>${tipo}</p>
                            </div>
                        `).join('')}
                    `;

                    tableContainer.style.display = 'block';
                    loadingContainer.style.display = 'none';
                }
            } catch (error) {
                messageContainer.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                loadingContainer.style.display = 'none';
            }
        }

        function exportarExcel() {
            window.location.href = `${BASE_URL}/visitas/export?format=excel`;
        }

        function recargar() {
            cargarDatos();
        }

        // Cargar datos al iniciar
        cargarDatos();

        // Recargar cada 30 segundos
        setInterval(cargarDatos, 30000);
    </script>
</body>
</html>
