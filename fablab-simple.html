<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAB LAB INACAP - Registro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ED1C24;
            --surface: #ffffff;
            --background: #f8f1ef;
            --text: #2b2b2b;
            --muted: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at top, rgba(237,28,36,0.18), transparent 35%), var(--background); color: var(--text); }
        .container { max-width: 620px; margin: 30px auto; padding: 0 20px; }
        .form-card { background: var(--surface); border-radius: 24px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid rgba(237,28,36,0.12); }
        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0 auto 18px;
        }
        .logo img { max-width: 140px; width: auto; height: auto; margin-bottom: 12px; }
        .logo-name { font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.14em; margin-bottom: 6px; }
        .logo-subtitle { font-size: 16px; text-transform: uppercase; color: var(--primary); margin-top: 0; letter-spacing: 0.22em; font-weight: 900; }
        .welcome-text { font-size: 16px; color: var(--text); text-align: center; margin-bottom: 16px; font-weight: 600; }
        .title { text-align: center; font-size: 30px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
        .form-group { margin-bottom: 18px; }
        .label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text); }
        .input { width: 100%; padding: 14px 16px; border: 2px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 16px; background: #fff; color: var(--text); }
        .input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(237,28,36,0.08); }
        .input.error { border-color: var(--primary); background: #fff5f5; }
        .error-text { color: var(--primary); font-size: 12px; margin-top: 6px; }
        .radio-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .radio-label { display: flex; align-items: center; gap: 10px; padding: 14px; border: 2px solid rgba(0,0,0,0.08); border-radius: 12px; cursor: pointer; background: #fff; transition: all 0.2s ease; }
        .radio-label:hover { border-color: var(--primary); }
        .radio-input { display: none; }
        .radio-custom { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; background: white; transition: all 0.2s ease; }
        .radio-input:checked + .radio-custom { background: var(--primary); border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(237,28,36,0.22); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; color: #666; }
        .success { text-align: center; padding: 40px 20px; background: var(--surface); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        .success-icon { font-size: 52px; color: var(--primary); margin-bottom: 20px; }
        .success-title { font-size: 24px; color: var(--text); margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function FabLabRegistro() {
            const [formData, setFormData] = useState({
                nombre: '',
                rut: '',
                correo: '',
                tipoVisita: '',
                telefono: '',
                proposito: ''
            });

            const [errors, setErrors] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);
            const [submissionError, setSubmissionError] = useState('');

            // Usar window.location.hostname para compatibilidad en red local, y puerto 5000
            let hostname = window.location.hostname;
            if (hostname === 'localhost') hostname = '127.0.0.1';

            const BASE_URL = `${window.location.protocol}//${hostname}:5000/api`;

            const formatRut = (rut) => {
                const cleaned = rut.replace(/[^\dkK]/gi, '').replace(/\s/g, '');
                if (cleaned.length <= 1) return cleaned;

                const dv = cleaned.slice(-1).toUpperCase();
                const body = cleaned.slice(0, -1).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return `${body}-${dv}`;
            };

            const validateField = (name, value) => {
                let error = '';
                switch(name) {
                    case 'nombre':
                        if (!value.trim()) error = 'Nombre requerido';
                        else if (value.trim().length < 2) error = 'Mínimo 2 caracteres';
                        else if (!/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(value.trim())) error = 'Solo letras, espacios y caracteres especiales';
                        break;
                    case 'rut':
                        if (!value.trim()) error = 'RUT requerido';
                        else if (!/^[0-9]{1,3}(\.[0-9]{3})*-[0-9kK]{1}$/.test(value)) error = 'Formato RUT inválido';
                        break;
                    case 'correo':
                        if (!value.trim()) error = 'Correo requerido';
                        else if (!/\S+@\S+\.\S+/.test(value)) error = 'Correo inválido';
                        break;
                    case 'tipoVisita':
                        if (!value) error = 'Seleccione tipo de visita';
                        break;
                    case 'telefono':
                        if (value && !/^\+?[\d\s-()]+$/.test(value)) error = 'Teléfono inválido';
                        break;
                }
                return error;
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                const newValue = name === 'rut' ? formatRut(value) : value;
                setFormData(prev => ({ ...prev, [name]: newValue }));

                const error = validateField(name, newValue);
                setErrors(prev => ({ ...prev, [name]: error }));
            };

            const isFormValid = () => {
                return !errors.nombre && !errors.rut && !errors.correo && !errors.tipoVisita && !errors.telefono &&
                       formData.nombre && formData.rut && formData.correo && formData.tipoVisita;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                const validationErrors = {
                    nombre: validateField('nombre', formData.nombre),
                    rut: validateField('rut', formData.rut),
                    correo: validateField('correo', formData.correo),
                    tipoVisita: validateField('tipoVisita', formData.tipoVisita),
                    telefono: validateField('telefono', formData.telefono),
                };

                setErrors(validationErrors);
                if (Object.values(validationErrors).some(Boolean)) return;

                setLoading(true);
                setSubmissionError('');

                try {
                    const response = await fetch(`${BASE_URL}/visitas`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({ message: 'Error al enviar datos' }));
                        throw new Error(errorData.message || 'Error de servidor');
                    }

                    setSubmitted(true);
                } catch (error) {
                    setSubmissionError(error.message || 'Error al conectar con el servidor');
                } finally {
                    setLoading(false);
                }
            };

            if (submitted) {
                return (
                    <div className="container">
                        <div className="success">
                            <div className="success-icon">✓</div>
                            <h2 className="success-title">¡Registro Exitoso!</h2>
                            <p>Bienvenido al FAB LAB INACAP</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="form-card">
                        <div className="logo">
                            <img src="logo-inacap.svg" alt="INACAP logo" />
                            <div className="logo-name">INACAP</div>
                            <div className="logo-subtitle">Fab Lab</div>
                        </div>

                        <h2 className="title">Registro de Visitas</h2>
                        <p className="welcome-text">Bienvenid@s al FAB LAB</p>

                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="label" htmlFor="nombre">Nombre Completo *</label>
                                <input
                                    id="nombre"
                                    type="text"
                                    name="nombre"
                                    value={formData.nombre}
                                    onChange={handleChange}
                                    className={`input ${errors.nombre ? 'error' : ''}`}
                                    placeholder="Juan Pérez"
                                />
                                {errors.nombre && <div className="error-text">{errors.nombre}</div>}
                            </div>

                            <div className="form-group">
                                <label className="label" htmlFor="rut">RUT *</label>
                                <input
                                    id="rut"
                                    type="text"
                                    name="rut"
                                    value={formData.rut}
                                    onChange={handleChange}
                                    className={`input ${errors.rut ? 'error' : ''}`}
                                    placeholder="12.345.678-9"
                                />
                                {errors.rut && <div className="error-text">{errors.rut}</div>}
                            </div>

                            <div className="form-group">
                                <label className="label" htmlFor="correo">Correo Electrónico *</label>
                                <input
                                    id="correo"
                                    type="email"
                                    name="correo"
                                    value={formData.correo}
                                    onChange={handleChange}
                                    className={`input ${errors.correo ? 'error' : ''}`}
                                    placeholder="correo@ejemplo.com"
                                />
                                {errors.correo && <div className="error-text">{errors.correo}</div>}
                            </div>

                            <div className="form-group">
                                <label className="label" htmlFor="tipoVisita">Tipo de Visita *</label>
                                <div className="radio-group">
                                    {[
                                        {value: 'estudiante', label: 'Estudiante'},
                                        {value: 'docente', label: 'Docente'},
                                        {value: 'externo', label: 'Externo'},
                                        {value: 'empresa', label: 'Empresa'}
                                    ].map(option => (
                                        <label key={option.value} className="radio-label">
                                            <input
                                                id={`tipo_${option.value}`}
                                                type="radio"
                                                name="tipoVisita"
                                                value={option.value}
                                                checked={formData.tipoVisita === option.value}
                                                onChange={handleChange}
                                                className="radio-input"
                                            />
                                            <span className="radio-custom"></span>
                                            {option.label}
                                        </label>
                                    ))}
                                </div>
                                {errors.tipoVisita && <div className="error-text">{errors.tipoVisita}</div>}
                            </div>

                            <div className="form-group">
                                <label className="label" htmlFor="telefono">Teléfono</label>
                                <input
                                    id="telefono"
                                    type="tel"
                                    name="telefono"
                                    value={formData.telefono}
                                    onChange={handleChange}
                                    className={`input ${errors.telefono ? 'error' : ''}`}
                                    placeholder="+56 9 1234 5678"
                                />
                                {errors.telefono && <div className="error-text">{errors.telefono}</div>}
                            </div>

                            <div className="form-group">
                                <label className="label" htmlFor="proposito">Propósito</label>
                                <textarea
                                    id="proposito"
                                    name="proposito"
                                    value={formData.proposito}
                                    onChange={handleChange}
                                    className="input"
                                    rows="3"
                                    placeholder="¿Qué deseas hacer en el FAB LAB?"
                                />
                            </div>

                            {submissionError && <div className="error-text">{submissionError}</div>}

                            <button
                                type="submit"
                                className="submit-btn"
                                disabled={!isFormValid() || loading}
                            >
                                {loading ? 'Registrando...' : 'Registrar Visita'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<FabLabRegistro />);
    </script>
</body>
</html>
