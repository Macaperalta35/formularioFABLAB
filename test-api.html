<!DOCTYPE html>
<html>
<head>
    <title>Test API Connection</title>
</head>
<body>
    <h1>Test API Connection</h1>
    <button onclick="testConnection()">Test Connection</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';

            try {
                console.log('Testing API connection...');
                const response = await fetch('http://127.0.0.1:5001/api/visitas', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = '<p style="color: green;">✅ API Connection Successful!</p><p>Data: ' + JSON.stringify(data).substring(0, 200) + '...</p>';
                } else {
                    result.innerHTML = '<p style="color: red;">❌ API Error: ' + response.status + '</p>';
                }
            } catch (error) {
                console.error('Connection error:', error);
                result.innerHTML = '<p style="color: red;">❌ Connection Failed: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
