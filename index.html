<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Formulario de registro de visitas del FAB LAB INACAP - Laboratorio de Fabricación Digital">
    <meta name="theme-color" content="#ED1C24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FAB LAB INACAP - Registro de Visitas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-bg"></div>

    <main class="container" id="main-container">
        <!-- Formulario -->
        <div id="form-container" class="form-card fade-in">
            <div class="card-accent"></div>
            <header class="logo-section">
                <div class="inacap-logo" aria-label="Logo INACAP">
                    <div class="inacap-mark">
                        <span class="inacap-block"></span>
                        <span class="inacap-bar"></span>
                    </div>
                    <span class="inacap-text">inacap</span>
                </div>
                <div class="header-divider"></div>
                <h1 class="title" id="page-title">FAB LAB</h1>
                <p class="subtitle">Laboratorio de Fabricación Digital</p>
                <span class="badge">Registro de Visitas</span>
            </header>

            <form id="registro-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label class="label" for="nombre">Nombre Completo <span class="req">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="nombre" name="nombre" class="input" placeholder="Ej: Juan Pérez González" required>
                    </div>
                    <div id="nombre-error" class="error-text hidden"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="label" for="rut">RUT <span class="req">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">🪪</span>
                            <input type="text" id="rut" name="rut" class="input" placeholder="12.345.678-9" maxlength="12" required>
                        </div>
                        <div id="rut-error" class="error-text hidden"></div>
                    </div>
                    <div class="form-group">
                        <label class="label" for="telefono">Teléfono</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="tel" id="telefono" name="telefono" class="input" placeholder="+56 9 1234 5678">
                        </div>
                        <div id="telefono-error" class="error-text hidden"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label" for="correo">Correo Electrónico <span class="req">*</span></label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="correo" name="correo" class="input" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div id="correo-error" class="error-text hidden"></div>
                </div>

                <div class="form-group">
                    <label class="label">Tipo de Visita <span class="req">*</span></label>
                    <div class="radio-group" id="tipo-visita-group">
                        <label class="radio-label" for="tipo-estudiante">
                            <input type="radio" name="tipoVisita" value="estudiante" id="tipo-estudiante" class="radio-input" required>
                            <span class="radio-custom"></span>
                            <span class="radio-text">🎓 Estudiante</span>
                        </label>
                        <label class="radio-label" for="tipo-docente">
                            <input type="radio" name="tipoVisita" value="docente" id="tipo-docente" class="radio-input">
                            <span class="radio-custom"></span>
                            <span class="radio-text">👨‍🏫 Docente</span>
                        </label>
                        <label class="radio-label" for="tipo-externo">
                            <input type="radio" name="tipoVisita" value="externo" id="tipo-externo" class="radio-input">
                            <span class="radio-custom"></span>
                            <span class="radio-text">🏢 Visitante Externo</span>
                        </label>
                        <label class="radio-label" for="tipo-empresa">
                            <input type="radio" name="tipoVisita" value="empresa" id="tipo-empresa" class="radio-input">
                            <span class="radio-custom"></span>
                            <span class="radio-text">🏭 Empresa</span>
                        </label>
                    </div>
                    <div id="tipoVisita-error" class="error-text hidden"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="proposito">Propósito de la Visita</label>
                    <div class="input-wrapper textarea-wrapper">
                        <textarea id="proposito" name="proposito" class="input textarea" placeholder="Ej: Impresión 3D, corte láser, prototipado..." rows="3"></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn" disabled>
                    <span class="btn-text">Registrar Visita</span>
                    <span class="btn-loader hidden">
                        <span class="spinner"></span> Registrando...
                    </span>
                </button>
            </form>

            <footer class="footer">
                <p class="footer-text">Al registrarte aceptas el uso de tus datos para estadísticas del laboratorio</p>
            </footer>
        </div>

        <!-- Pantalla de Éxito -->
        <div id="success-container" class="success-card hidden">
            <div class="success-anim">
                <div class="checkmark-circle">
                    <svg viewBox="0 0 52 52" class="checkmark-svg">
                        <circle cx="26" cy="26" r="25" fill="none" class="checkmark-circle-bg"/>
                        <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" class="checkmark-path"/>
                    </svg>
                </div>
            </div>
            <h2 class="success-title">¡Registro Exitoso!</h2>
            <p class="success-text">Bienvenido al FAB LAB INACAP</p>
            <div class="stats">
                <div class="stat-pill">📊 Visita #<span id="visit-count">1</span></div>
                <div class="stat-pill">🕐 <span id="current-time"></span></div>
            </div>
            <div class="redirect-bar">
                <div class="redirect-progress"></div>
            </div>
            <p class="redirect-text">Volviendo al formulario...</p>
        </div>
    </main>

    <script>
        // ========== CONFIG ==========
        // URL de tu Google Apps Script (Web App)
        // INSTRUCCIONES: Reemplaza esta URL con la de tu Google Apps Script desplegado
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyjHRl3FbC0EKto7_8p_f_K0sFP9xZUIdEUtXCQhLlXL5tNreG-jAn12izw2ZiRnQgSSA/exec';

        // ========== DOM ==========
        const form = document.getElementById('registro-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const btnLoader = submitBtn.querySelector('.btn-loader');
        const formContainer = document.getElementById('form-container');
        const successContainer = document.getElementById('success-container');
        const visitCountSpan = document.getElementById('visit-count');
        const currentTimeSpan = document.getElementById('current-time');

        let visitCount = parseInt(localStorage.getItem('fablab_visit_count') || '0');

        // ========== BACKEND: Google Sheets via Apps Script ==========
        async function postRegistro(payload) {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            // mode: no-cors siempre devuelve opaque response, se asume éxito
            return { ok: true };
        }

        // ========== VALIDACIONES ==========
        function formatRUT(value) {
            const cleaned = value.replace(/[^\dkK]/g, '');
            if (cleaned.length <= 1) return cleaned;
            const body = cleaned.slice(0, -1);
            const dv = cleaned.slice(-1);
            return body.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + dv;
        }

        function validateRUT(rut) {
            const cleaned = rut.replace(/[^\dkK]/g, '');
            return cleaned.length >= 8 && cleaned.length <= 9;
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validatePhone(phone) {
            if (!phone.trim()) return true;
            return phone.replace(/[^\d]/g, '').length >= 8;
        }

        function validateField(name, value) {
            switch (name) {
                case 'nombre':
                    if (!value.trim()) return 'El nombre es requerido';
                    if (value.trim().length < 2) return 'Mínimo 2 caracteres';
                    if (/[0-9]/.test(value)) return 'Solo letras y espacios';
                    return '';
                case 'rut':
                    if (!value.trim()) return 'El RUT es requerido';
                    if (!validateRUT(value)) return 'RUT inválido';
                    return '';
                case 'correo':
                    if (!value.trim()) return 'El correo es requerido';
                    if (!validateEmail(value)) return 'Correo inválido';
                    return '';
                case 'tipoVisita':
                    if (!value) return 'Seleccione tipo de visita';
                    return '';
                case 'telefono':
                    if (!validatePhone(value)) return 'Teléfono inválido';
                    return '';
                default: return '';
            }
        }

        function updateFieldUI(field) {
            const err = validateField(field.name, field.value);
            const errDiv = document.getElementById(field.name + '-error');
            if (errDiv) {
                if (err) {
                    field.classList.add('error');
                    errDiv.textContent = err;
                    errDiv.classList.remove('hidden');
                } else {
                    field.classList.remove('error');
                    errDiv.classList.add('hidden');
                    errDiv.textContent = '';
                }
            }
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const n = document.getElementById('nombre').value;
            const r = document.getElementById('rut').value;
            const c = document.getElementById('correo').value;
            const t = document.querySelector('input[name="tipoVisita"]:checked');
            const p = document.getElementById('telefono').value;
            const valid = n.trim().length >= 2 && !/[0-9]/.test(n)
                && validateRUT(r) && validateEmail(c) && t !== null && validatePhone(p);
            submitBtn.disabled = !valid;
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('rut').addEventListener('input', function(e) {
            e.target.value = formatRUT(e.target.value);
            updateFieldUI(e.target);
        });

        document.getElementById('nombre').addEventListener('keypress', function(e) {
            if (/[0-9]/.test(e.key)) e.preventDefault();
        });

        document.querySelectorAll('input, textarea').forEach(f => {
            f.addEventListener('input', function() { updateFieldUI(this); });
        });

        document.querySelectorAll('input[name="tipoVisita"]').forEach(r => {
            r.addEventListener('change', function() { updateFieldUI(this); });
        });

        // ========== SUBMIT ==========
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const tipoVisita = document.querySelector('input[name="tipoVisita"]:checked');
                const payload = {
                    nombre: document.getElementById('nombre').value.trim(),
                    rut: document.getElementById('rut').value.trim(),
                    correo: document.getElementById('correo').value.trim(),
                    tipoVisita: tipoVisita ? tipoVisita.value : '',
                    telefono: document.getElementById('telefono').value.trim(),
                    proposito: document.getElementById('proposito').value.trim(),
                    fecha: new Date().toLocaleString('es-CL', { timeZone: 'America/Santiago' })
                };

                await postRegistro(payload);

                visitCount++;
                localStorage.setItem('fablab_visit_count', visitCount.toString());
                visitCountSpan.textContent = visitCount;
                currentTimeSpan.textContent = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                successContainer.classList.add('fade-in');

                setTimeout(() => {
                    successContainer.classList.add('hidden');
                    successContainer.classList.remove('fade-in');
                    formContainer.classList.remove('hidden');
                    form.reset();
                    btnText.classList.remove('hidden');
                    btnLoader.classList.add('hidden');
                    submitBtn.disabled = true;
                    document.querySelectorAll('.error-text').forEach(el => el.classList.add('hidden'));
                    document.querySelectorAll('.input').forEach(el => el.classList.remove('error'));
                }, 5000);
            } catch (err) {
                let banner = document.getElementById('submit-error-banner');
                const msg = err?.message || 'Error al conectar. Intenta nuevamente.';
                if (!banner) {
                    banner = document.createElement('div');
                    banner.id = 'submit-error-banner';
                    banner.className = 'error-banner';
                    banner.textContent = msg;
                    form.prepend(banner);
                } else {
                    banner.textContent = msg;
                    banner.classList.remove('hidden');
                }
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                updateSubmitButton();
            }
        });

        updateSubmitButton();
    </script>
</body>
</html>
