<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR - FAB LAB INACAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 440px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ED1C24, #c41820);
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo svg { filter: drop-shadow(0 2px 8px rgba(237,28,36,0.3)); }
        
        .inacap-logo {
            display: inline-flex;
            align-items: flex-end;
            gap: 6px;
            margin: 0 auto 12px;
        }
        .inacap-mark {
            display: flex;
            gap: 2px;
            align-items: stretch;
            height: 38px;
        }
        .inacap-block {
            display: block;
            width: 28px;
            height: 100%;
            background: #ED1C24;
        }
        .inacap-bar {
            display: block;
            width: 6px;
            height: 100%;
            background: #ED1C24;
        }
        .inacap-text {
            font-family: 'Arial', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1;
            letter-spacing: -0.5px;
        }
        h1 { font-size: 1.75rem; font-weight: 800; color: #1a1a2e; }
        .sub { font-size: 0.875rem; color: #6b7280; margin-bottom: 28px; }
        #qr-container {
            background: #fff;
            border: 3px solid #f0f2f5;
            border-radius: 16px;
            padding: 20px;
            display: inline-block;
            margin-bottom: 24px;
        }
        #qr-container img {
            display: block;
            width: 220px;
            height: 220px;
        }
        .url-display {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.8125rem;
            color: #6b7280;
            word-break: break-all;
            margin-bottom: 24px;
        }
        .url-display strong { color: #1a1a2e; }
        .instructions {
            font-size: 0.8125rem;
            color: #9ca3af;
            line-height: 1.7;
            text-align: left;
            background: #f9fafb;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
        }
        .instructions strong { color: #1a1a2e; }
        .instructions ol { padding-left: 18px; }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #ED1C24, #c41820);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(237,28,36,0.35);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(237,28,36,0.4); }
        @media print {
            body { background: #fff; padding: 0; }
            .card { box-shadow: none; padding: 20px; }
            .btn, .instructions { display: none; }
        }
        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            h1 { font-size: 1.375rem; }
            #qr-container img { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo" style="flex-direction: column; gap: 4px;">
            <div class="inacap-logo" aria-label="Logo INACAP">
                <div class="inacap-mark">
                    <span class="inacap-block"></span>
                    <span class="inacap-bar"></span>
                </div>
                <span class="inacap-text">inacap</span>
            </div>
            <h1>FAB LAB</h1>
        </div>
        <p class="sub">Escanea el código QR para registrar tu visita</p>

        <div id="qr-container">
            <img id="qr-img" alt="Código QR del formulario FAB LAB"
                 src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https%3A%2F%2Fmacaperalta35.github.io%2FformularioFABLAB%2F&format=png&ecc=H">
        </div>

        <div class="url-display">
            <strong>URL:</strong> https://macaperalta35.github.io/formularioFABLAB/
        </div>

        <div class="instructions">
            <strong>📱 Instrucciones:</strong>
            <ol>
                <li>Abre la cámara de tu celular</li>
                <li>Apunta al código QR</li>
                <li>Toca la notificación que aparece</li>
                <li>Completa el formulario de registro</li>
            </ol>
        </div>

        <button class="btn" onclick="window.print()">🖨️ Imprimir este QR</button>
    </div>
</body>
</html>
